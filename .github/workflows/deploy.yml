name: Deploy
on:
  push:
    branches:
      - master
  workflow_dispatch:
jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Stop service
        run: sudo systemctl stop RssFeed.service
      - name: Publish
        run: dotnet publish RssFeed/RssFeed.csproj -c Release -o /home/tzer0m/Services/RssFeed
      - name: Start service
        run: sudo systemctl start RssFeed.service
      - name: Check status
        run: sudo systemctl status RssFeed.service --no-pager
